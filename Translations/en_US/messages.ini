mautic.config.tab.smartrouteconfig="Sendability SmartRoute"

sendability.smartroute.config.header="Sendability SmartRoute"
sendability.smartroute.config.description="Route emails through different SMTP servers based on recipient domain or contact custom field. Powered by Sendability.com."

sendability.smartroute.config.enabled="Enable Smart Routing"
sendability.smartroute.config.enabled.tooltip="When enabled, emails matching your routing rules will be sent through the secondary SMTP server."

sendability.smartroute.config.dsn_header="Secondary SMTP Server"
sendability.smartroute.config.dsn_description="Configure the secondary SMTP server that matching emails will be routed through."

sendability.smartroute.config.secondary_dsn="Secondary SMTP Configuration"
sendability.smartroute.config.secondary_dsn.tooltip="The SMTP connection details for the secondary mail server."

sendability.smartroute.config.sender_header="Sending Identity"
sendability.smartroute.config.sender_description="Override the From address when sending through the secondary SMTP server. The sending domain must be verified with your SMTP provider."

sendability.smartroute.config.from_email="From Email Address"
sendability.smartroute.config.from_email.tooltip="The From email address to use when sending through the secondary SMTP. Must use a domain verified with your SMTP provider (e.g. SparkPost). Leave empty to use Mautic's default From address."

sendability.smartroute.config.from_name="From Name"
sendability.smartroute.config.from_name.tooltip="The sender name to display when sending through the secondary SMTP. Leave empty to use Mautic's default From name."

sendability.smartroute.config.routing_header="Routing Rules"
sendability.smartroute.config.routing_description="Define which emails should be sent through the secondary SMTP server."

sendability.smartroute.config.mode="Routing Mode"
sendability.smartroute.config.mode.tooltip="Choose whether to route emails based on the recipient's email domain or a contact custom field value."
sendability.smartroute.config.mode.domain="Route by recipient email domain"
sendability.smartroute.config.mode.custom_field="Route by contact custom field"

sendability.smartroute.config.domain_list="Domain List"
sendability.smartroute.config.domain_list.tooltip="Comma-separated list of email domains that should use the secondary SMTP server (e.g. gmail.com, yahoo.com, hotmail.com, outlook.com)."

sendability.smartroute.config.custom_field="Contact Custom Field Alias"
sendability.smartroute.config.custom_field.tooltip="The alias of the contact custom field to check. Create this field in Mautic's custom field settings first."

sendability.smartroute.config.field_value="Field Value to Match"
sendability.smartroute.config.field_value.tooltip="When the contact's custom field value matches this, the email will be routed through the secondary SMTP server."

sendability.smartroute.config.secondary_percentage="Secondary SMTP Percentage (%)"
sendability.smartroute.config.secondary_percentage.tooltip="Percentage of matching emails to send via the secondary SMTP (0–100). 100 = all matching go to secondary (default). 20 = only 20% go to secondary, the rest use the default SMTP. The split is deterministic per contact — the same recipient always hits the same transport."
